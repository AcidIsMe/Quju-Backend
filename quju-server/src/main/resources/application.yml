  # ---- MySQL 配置 ----
  datasource:
    url: "jdbc:mysql://localhost:3306/quju?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&createDatabaseIfNotExist=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
